<div class="todo-container">
  <h1>My To-Do List</h1>
  <input type="text" [(ngModel)]="task" placeholder="Add new task">
  <button (click)="addTask()">Add</button>

  <ul>
    <li *ngFor="let t of tasks; index as i">
      <input type="checkbox" [(ngModel)]="t.done" (change)="toggleDone(t)">
      <span [class.done]="t.done">{{ t.name }}</span>
      <button (click)="removeTask(i)">Delete</button>
    </li>
  </ul>
</div>
