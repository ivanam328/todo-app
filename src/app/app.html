<div class="todo-container">
  <h1>Mini To-Do Lista</h1>
  
  <input [(ngModel)]="task" placeholder="Unesi zadatak" />
  <button (click)="addTask()">Dodaj</button>
  
  <ul>
    <li *ngFor="let t of tasks; let i = index">
      {{ t }}
      <button (click)="removeTask(i)">Obriši</button>
    </li>
  </ul>
</div>
